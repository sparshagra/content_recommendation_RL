task_id: "medium_task"
description: "Engagement with content diversity penalty. Reward = CTR - 0.3 * (1 - genre_diversity). Requires balancing CTR vs. exploration."
max_steps: 10
seed: 42
difficulty: medium

grader: graders.medium_task_grader
has_grader: true
success_threshold: 0.15
score_range: [0.0, 1.0]
metric: engagement_minus_diversity_penalty

grader_bounds:
  max_score: 1.0
  min_score: 0.0

grader_weights:
  ctr: 0.7
  diversity: 0.3
