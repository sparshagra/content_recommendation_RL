name: content-recommendation
version: 1.0.0
description: "A realistic content recommendation environment where an RL agent learns to recommend items (articles, videos, songs) to users based on click-through rate, diversity, and long-term retention."
entry_point: "app:app"

# Define the tasks for the validator and the agents
tasks:
  - id: "easy_task"
    difficulty: "easy"
    description: "Pure CTR optimization. Reward = clicks / 5. Stable, greedy strategies work."
    config_path: "tasks/easy.yaml"

  - id: "medium_task"
    difficulty: "medium"
    description: "Engagement with content diversity penalty. Requires balancing CTR vs. exploration."
    config_path: "tasks/medium.yaml"

  - id: "hard_task"
    difficulty: "hard"
    description: "Long-term user lifetime value with churn prevention. Requires understanding long-term user dynamics."
    config_path: "tasks/hard.yaml"
