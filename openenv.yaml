spec_version: 1
name: content-recommendation
type: space
runtime: fastapi
app: app:app
port: 7860

description: |
  A realistic content recommendation environment where an RL agent learns to recommend
  items (articles, videos, songs) to users. The agent observes user preferences and 
  interaction history, then recommends 5 items. Users engage based on similarity to 
  preferences, content freshness, and fatigue dynamics. Three difficulty levels test
  different aspects: CTR optimization (easy), diversity + engagement (medium), and
  long-term churn prevention (hard).

version: "1.0.0"
author: "dikshi2025"
license: "MIT"

# Environment class reference
env_class: content_rec_env.ContentRecEnv

# Action space definition
action_space:
  type: discrete
  shape: [5]
  dtype: int32
  description: |
    List of 5 item IDs to recommend (0-499).
    The agent selects which 5 items from the catalog to show the user.
  bounds:
    min: [0, 0, 0, 0, 0]
    max: [499, 499, 499, 499, 499]

# Observation space definition
observation_space:
  type: dict
  components:
    user_id:
      type: int32
      description: "Unique user ID (0-999)"
    session_id:
      type: int32
      description: "Session identifier, unique per episode"
    interaction_history:
      type: list[int32]
      shape: [5]
      description: "Last 5 item IDs the user clicked (padded with -1)"
    genre_preferences:
      type: dict[str, float]
      description: |
        User's preference scores for 5 genres: pop, tech, sports, 
        entertainment, news (each in [0.0, 1.0])
    user_satisfaction:
      type: float32
      range: [0.0, 1.0]
      description: "Cumulative user satisfaction in current session"
    user_fatigue:
      type: float32
      range: [0.0, 1.0]
      description: "Content fatigue level (decreases engagement if high)"
    churn_risk:
      type: float32
      range: [0.0, 1.0]
      description: "Estimated probability user will churn (leave platform)"
    session_step:
      type: int32
      description: "Current step number in session (1-10)"
    available_items:
      type: list[object]
      description: |
        List of 500 content items with properties:
        - item_id (int): 0-499
        - title (str): content title
        - genre (str): one of pop, tech, sports, entertainment, news
        - embedding (list[float]): 16-dim embedding vector
        - popularity (float): base popularity score [0-1]
        - freshness (int): days old (0-90)
        - duration (int): content duration in seconds
    last_action:
      type: list[int32] | null
      description: "Previous 5 recommendations (null on first step)"
    last_clicks:
      type: list[int32] | null
      description: "Items user clicked in previous step (null on first step)"
    last_reward:
      type: float32
      description: "Reward from previous step"

# Reward function specs per task
tasks:
  - name: easy_task
    description: |
      Pure CTR (click-through rate) optimization. 
      Reward = (number of clicked items) / 5
      Difficulty: Easy - stable, greedy strategies work
      Baseline score: ~0.54
    difficulty: easy
    reward_function: content_rec_env.EasyReward
    evaluation_metric: average_ctr
    success_threshold: 0.25
    grader: graders.easy_task_grader
    
  - name: medium_task
    description: |
      Engagement with content diversity penalty.
      Reward = CTR - 0.3 * (1 - genre_diversity)
      Difficulty: Medium - requires balancing CTR vs. exploration
      Baseline score: ~0.36
    difficulty: medium
    reward_function: content_rec_env.MediumReward
    evaluation_metric: engagement_minus_diversity_penalty
    success_threshold: 0.15
    grader: graders.medium_task_grader
    
  - name: hard_task
    description: |
      Long-term user lifetime value with churn prevention.
      Reward = CTR + 0.4 * satisfaction_bonus - 0.5 * churn_penalty + 0.2 * diversity_bonus
      Difficulty: Hard - requires understanding long-term user dynamics
      Baseline score: ~0.51
    difficulty: hard
    reward_function: content_rec_env.HardReward
    evaluation_metric: lifetime_value_with_churn
    success_threshold: 0.20
    grader: graders.hard_task_grader

# Graders — deterministic scoring functions for each task
graders:
  - task: easy_task
    type: deterministic
    logic: graders.easy_task_grader
    score_range: [0.0, 1.0]
    description: "Scores agent on average CTR over the episode"
    
  - task: medium_task
    type: deterministic
    logic: graders.medium_task_grader
    score_range: [0.0, 1.0]
    description: "Scores agent on engagement minus diversity penalty"
    
  - task: hard_task
    type: deterministic
    logic: graders.hard_task_grader
    score_range: [0.0, 1.0]
    description: "Scores agent on lifetime value with churn prevention"

# Simulation parameters
simulation:
  num_steps_per_episode: 10
  num_users: 1000
  num_items: 500
  item_genres: [pop, tech, sports, entertainment, news]
  seed: 42
  deterministic: false  # User behavior is stochastic

# Baseline performance
baseline:
  model_name: heuristic-baseline
  description: |
    Simple recommendation strategy scoring items by:
    - 50% popularity
    - 30% genre preference match
    - 20% freshness (recency) bonus
    With diversity penalty for repeated genres and repeat avoidance.
  scores:
    easy_task: 0.540
    medium_task: 0.360
    hard_task: 0.506
    average: 0.469

# Evaluation protocol
evaluation:
  mode: episode
  episodes_per_task: 5
  aggregation: average
  metrics:
    - name: score
      type: float
      range: [0.0, 1.0]
      description: "Normalized reward (average over episode steps)"
    - name: success_rate
      type: float
      range: [0.0, 1.0]
      description: "Percentage of episodes above success threshold"
    - name: cumulative_reward
      type: float
      description: "Total reward summed over all steps"
    - name: diversity_score
      type: float
      range: [0.0, 1.0]
      description: "Genre diversity of recommendations (medium/hard tasks only)"

# Platform info
metadata:
  created_date: "2026-04-06"
  updated_date: "2026-04-06"
  framework: openenv
  python_version: ">=3.9"
  dependencies:
    - numpy
    - dataclasses (built-in for Python 3.7+)
  async_support: true
  docker_support: true
  huggingface_spaces: true
